# /infrastructure/nginx/nginx.conf
# Production-grade Nginx reverse proxy configuration.
# Day 10 of the 30-day API Gateway build.

# ── Worker config ──────────────────────────────────────────────────────────
worker_processes auto;                    # one worker per CPU core
worker_rlimit_nofile 65535;               # max open file descriptors per worker
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;              # max connections per worker
    use epoll;                            # efficient I/O on Linux
    multi_accept on;                      # accept multiple connections at once
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Structured JSON access log ─────────────────────────────────────
    # Format matches what Logstash expects on Day 16 (ELK stack).
    log_format json_access escape=json
        '{'
            '"timestamp":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"x_forwarded_for":"$http_x_forwarded_for",'
            '"request_id":"$request_id",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"upstream_addr":"$upstream_addr",'
            '"http_referrer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"api_version":"$http_x_api_version"'
        '}';

    access_log /var/log/nginx/access.log json_access;

    # ── Performance ────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  75s;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens      off;              # hide Nginx version

    # ── Gzip compression ───────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   256;
    gzip_types
        application/json
        application/javascript
        application/xml
        text/plain
        text/css
        text/xml
        text/javascript
        image/svg+xml;

    # ── Rate limiting zones ────────────────────────────────────────────
    # Nginx-layer rate limiting (first line of defence, before gateway).
    # Gateway also has its own rate limiter (Day 8) — belt and suspenders.
    limit_req_zone $binary_remote_addr zone=global:10m   rate=200r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m     rate=20r/m;
    limit_req_zone $binary_remote_addr zone=api:10m      rate=150r/m;
    limit_req_status 429;

    # ── Connection limiting ────────────────────────────────────────────
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Upstream: API Gateway ──────────────────────────────────────────
    # In Kubernetes (Day 21) this becomes the gateway Service ClusterIP.
    # For local dev, points to the Fastify process directly.
    upstream api_gateway {
        server api-gateway:5000;          # Docker service name
        keepalive 32;                     # reuse connections to gateway
        keepalive_requests 100;
        keepalive_timeout 60s;
    }

    # ── HTTP server (redirects to HTTPS in production) ─────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Health check — bypasses rate limiting, no redirect
        location = /nginx-health {
            access_log off;
            return 200 '{"status":"ok","service":"nginx"}';
            add_header Content-Type application/json always;
        }

        # In production: redirect all HTTP → HTTPS
        # In development: proxy directly (no SSL)
        location / {
            # Uncomment for production SSL redirect:
            # return 301 https://$host$request_uri;

            include /etc/nginx/conf.d/proxy.conf;
            proxy_pass http://api_gateway;
        }
    }

    # ── HTTPS server ───────────────────────────────────────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name _;

        # SSL certificates (self-signed for dev, Let's Encrypt for prod)
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # Modern SSL config (TLS 1.2+ only)
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;
        ssl_session_tickets       off;
        ssl_stapling              off;    # disabled for self-signed certs

        include /etc/nginx/conf.d/security-headers.conf;
        include /etc/nginx/conf.d/rate-limiting.conf;

        # ── Health check (no rate limit, no auth) ─────────────────────
        location = /nginx-health {
            access_log off;
            return 200 '{"status":"ok","service":"nginx","tls":true}';
            add_header Content-Type application/json always;
        }

        location = /health {
            include /etc/nginx/conf.d/proxy.conf;
            proxy_pass http://api_gateway;
            access_log off;
        }

        # ── Auth routes (stricter rate limit) ─────────────────────────
        location ~ ^/api/v[0-9]+/auth/ {
            limit_req zone=auth burst=5 nodelay;
            limit_conn conn_limit 10;
            include /etc/nginx/conf.d/proxy.conf;
            proxy_pass http://api_gateway;
        }

        # ── All other API routes ───────────────────────────────────────
        location ~ ^/api/ {
            limit_req zone=api burst=20 nodelay;
            limit_conn conn_limit 20;
            include /etc/nginx/conf.d/proxy.conf;
            proxy_pass http://api_gateway;
        }

        # ── Catch-all ─────────────────────────────────────────────────
        location / {
            limit_req zone=global burst=10 nodelay;
            include /etc/nginx/conf.d/proxy.conf;
            proxy_pass http://api_gateway;
        }
    }
}