# /infrastructure/nginx/conf.d/proxy.conf
# Shared proxy settings — included by every location block.
# Keeps nginx.conf DRY.

# Forward real client info to Fastify
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host  $host;
proxy_set_header X-Forwarded-Port  $server_port;

# Thread request ID through for distributed tracing (Day 15)
proxy_set_header X-Request-ID      $request_id;

# Keep-alive connections to upstream
proxy_http_version 1.1;
proxy_set_header Connection "";

# Timeouts
proxy_connect_timeout 10s;
proxy_send_timeout    60s;
proxy_read_timeout    60s;

# Buffer settings — prevents upstream from being blocked waiting for slow clients
proxy_buffering           on;
proxy_buffer_size         4k;
proxy_buffers             8 8k;
proxy_busy_buffers_size   16k;

# Don't pass error pages from upstream — let Nginx handle them
proxy_intercept_errors off;

# Don't forward these response headers from upstream
proxy_hide_header X-Powered-By;
proxy_hide_header Server;