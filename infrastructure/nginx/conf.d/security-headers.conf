# /infrastructure/nginx/conf.d/security-headers.conf
# HTTP security headers added at the Nginx layer.
# These complement the headers set by @fastify/helmet (Day 2).
# Having them at Nginx means they're applied even if the upstream
# service forgets to set them.

# HSTS — forces HTTPS for 1 year, includes subdomains
# Only meaningful on the HTTPS server block.
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# Prevent MIME type sniffing
add_header X-Content-Type-Options "nosniff" always;

# Clickjacking protection
add_header X-Frame-Options "DENY" always;

# XSS protection (legacy browsers)
add_header X-XSS-Protection "1; mode=block" always;

# Referrer policy
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Content Security Policy
# Adjust script-src if you add external JS (analytics, CDN, etc.)
add_header Content-Security-Policy
    "default-src 'self';
     script-src 'self';
     style-src 'self' 'unsafe-inline';
     img-src 'self' data: https:;
     font-src 'self';
     connect-src 'self';
     object-src 'none';
     frame-ancestors 'none';
     base-uri 'self';
     form-action 'self'"
    always;

# Permissions Policy — disable unused browser APIs
add_header Permissions-Policy
    "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()"
    always;

# Remove server identification
server_tokens off;
more_clear_headers Server;          # requires ngx_headers_more module