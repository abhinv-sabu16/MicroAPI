# /infrastructure/nginx/conf.d/rate-limiting.conf
# Rate limiting applied inside the HTTPS server block.
# Zones are defined in nginx.conf http block.
#
# Two-layer rate limiting strategy:
#  Layer 1: Nginx (this file)    — coarse, blocks obvious abuse fast
#  Layer 2: Fastify gateway (Day 8) — fine-grained, per-route limits

# Default: 429 response body when Nginx rate-limits a request
limit_req_status 429;

# Custom 429 error page
error_page 429 @rate_limited;
location @rate_limited {
    default_type application/json;
    return 429 '{"status":"error","code":"NGINX_RATE_LIMIT_EXCEEDED","message":"Too many requests. Please slow down.","retryAfter":60}';
}

# Custom 413 error page (body too large)
error_page 413 @body_too_large;
location @body_too_large {
    default_type application/json;
    return 413 '{"status":"error","code":"PAYLOAD_TOO_LARGE","message":"Request body is too large. Maximum size is 10mb."}';
}

# Body size limit — matches the gateway bodyLimit from Day 9
client_max_body_size 10m;
client_body_timeout  30s;
client_header_timeout 10s;