# /infrastructure/nginx/nginx.dev.conf
# Development Nginx config — HTTP only, no SSL, permissive rate limits.
# Used in docker-compose for local development.
# Switch to nginx.conf for production/staging.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Structured JSON logs — same format as production
    log_format json_access escape=json
        '{'
            '"timestamp":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"request_id":"$request_id",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time"'
        '}';

    access_log /var/log/nginx/access.log json_access;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens   off;

    # Gzip
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;
    gzip_min_length 256;

    # Rate limiting (relaxed for development)
    limit_req_zone $binary_remote_addr zone=dev_global:10m rate=300r/m;
    limit_req_zone $binary_remote_addr zone=dev_auth:10m   rate=60r/m;
    limit_req_status 429;

    # Upstream: Fastify API Gateway
    upstream api_gateway {
        server 127.0.0.1:5000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name localhost;

        # Forward real client IP to gateway
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host             $host;
        proxy_set_header X-Request-ID     $request_id;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # Nginx health (not proxied)
        location = /nginx-health {
            access_log off;
            return 200 '{"status":"ok","service":"nginx","env":"development"}';
            add_header Content-Type application/json always;
        }

        # Auth routes — stricter dev limit
        location ~ ^/api/v[0-9]+/auth/ {
            limit_req zone=dev_auth burst=20 nodelay;
            proxy_pass http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        proxy_set_header Content-Type $content_type;
        }

        # All other routes
        location / {
            limit_req zone=dev_global burst=50 nodelay;
            proxy_pass http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        proxy_set_header Content-Type $content_type;
        }
    }
}