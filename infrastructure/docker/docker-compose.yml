# docker-compose.yml — Local Development Stack
# Usage:
#   docker compose -f infrastructure/docker/docker-compose.yml up --build
#   docker compose -f infrastructure/docker/docker-compose.yml down -v

version: "3.9"

x-common-env: &common-env
  NODE_ENV: development
  LOG_LEVEL: ${LOG_LEVEL:-info}

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - gateway-net

volumes:
  postgres-data:
    name: gateway_postgres_data
  redis-data:
    name: gateway_redis_data

networks:
  gateway-net:
    name: gateway-network
    driver: bridge

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────
  postgres:
    <<: *service-defaults
    image: postgres:16-alpine
    container_name: gateway_postgres
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB:       ${POSTGRES_DB:-gateway_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-gateway_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ───────────────────────────────────────────────────────────────
  redis:
    <<: *service-defaults
    image: redis:7-alpine
    container_name: gateway_redis
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API Gateway ─────────────────────────────────────────────────────────
  api-gateway:
    <<: *service-defaults
    container_name: gateway_api
    build:
      context: ../..
      dockerfile: apps/api-gateway/Dockerfile
      target: development
    environment:
      <<: *common-env
      GATEWAY_PORT:             5000
      GATEWAY_HOST:             0.0.0.0
      JWT_SECRET:               ${JWT_SECRET:-dev-secret-change-in-production-32chars!!}
      JWT_ACCESS_TOKEN_TTL:     ${JWT_ACCESS_TOKEN_TTL:-15m}
      JWT_REFRESH_TOKEN_TTL:    ${JWT_REFRESH_TOKEN_TTL:-7d}
      CORS_ORIGINS:             ${CORS_ORIGINS:-}
      REDIS_URL:                redis://redis:6379
      AUTH_SERVICE_URL:         http://auth-service:5001
      USER_SERVICE_URL:         http://user-service:5002
      NOTIFICATION_SERVICE_URL: http://notification-service:5003
      RATE_LIMIT_MAX:           ${RATE_LIMIT_MAX:-100}
      RATE_LIMIT_WINDOW_MS:     ${RATE_LIMIT_WINDOW_MS:-60000}
    ports:
      - "${GATEWAY_PORT:-5000}:5000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 25s

  # ── Auth Service ────────────────────────────────────────────────────────
  auth-service:
    <<: *service-defaults
    container_name: gateway_auth
    build:
      context: ../..
      dockerfile: apps/auth-service/Dockerfile
      target: development
    environment:
      <<: *common-env
      AUTH_SERVICE_PORT: 5001
      JWT_SECRET:        ${JWT_SECRET:-dev-secret-change-in-production-32chars!!}
      DATABASE_URL:      postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-gateway_db}
      REDIS_URL:         redis://redis:6379
    ports:
      - "${AUTH_SERVICE_PORT:-5001}:5001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 25s

  # ── User Service ────────────────────────────────────────────────────────
  user-service:
    <<: *service-defaults
    container_name: gateway_user
    build:
      context: ../..
      dockerfile: apps/user-service/Dockerfile
      target: development
    environment:
      <<: *common-env
      USER_SERVICE_PORT: 5002
      DATABASE_URL:      postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-gateway_db}
      REDIS_URL:         redis://redis:6379
    ports:
      - "${USER_SERVICE_PORT:-5002}:5002"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5002/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 25s

  # ── Notification Service ────────────────────────────────────────────────
  notification-service:
    <<: *service-defaults
    container_name: gateway_notification
    build:
      context: ../..
      dockerfile: apps/notification-service/Dockerfile
      target: development
    environment:
      <<: *common-env
      NOTIFICATION_SERVICE_PORT: 5003
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-5003}:5003"

  # ── Nginx (minimal — full config Day 10) ───────────────────────────────
  nginx:
    <<: *service-defaults
    image: nginx:1.25-alpine
    container_name: gateway_nginx
    volumes:
      - ../nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      api-gateway:
        condition: service_healthy
